name: lfc_core
description: Shared Flutter core for LFC demo apps.
publish_to: 'none'
resolution: workspace

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_riverpod: ^2.6.1
  dio: ^5.9.0
  flutter_secure_storage: ^9.2.4
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.3
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/flags/
    - assets/fonts/
