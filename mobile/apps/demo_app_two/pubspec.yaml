name: demo_app_two
description: Placeholder second demo app shell.
publish_to: 'none'
resolution: workspace

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  lfc_core: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  dio: ^5.9.0
  flutter_secure_storage: ^9.2.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Changa
      fonts:
        - asset: assets/fonts/Changa-VF.ttf
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
